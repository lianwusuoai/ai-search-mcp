name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ai-search-mcp.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ai-search-mcp-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ai-search-mcp-macos

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary to package
        shell: bash
        run: |
          mkdir -p ai_search_mcp/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/ai-search-mcp.exe ai_search_mcp/bin/${{ matrix.binary }}
          else
            cp target/${{ matrix.target }}/release/ai-search-mcp ai_search_mcp/bin/${{ matrix.binary }}
            chmod +x ai_search_mcp/bin/${{ matrix.binary }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}
          path: ai_search_mcp/bin/${{ matrix.binary }}

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Copy binaries to package
        run: |
          mkdir -p ai_search_mcp/bin
          cp artifacts/binary-windows-latest/ai-search-mcp.exe ai_search_mcp/bin/
          cp artifacts/binary-ubuntu-latest/ai-search-mcp-linux ai_search_mcp/bin/
          cp artifacts/binary-macos-latest/ai-search-mcp-macos ai_search_mcp/bin/
          chmod +x ai_search_mcp/bin/ai-search-mcp-linux
          chmod +x ai_search_mcp/bin/ai-search-mcp-macos
          ls -lh ai_search_mcp/bin/

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build --wheel

      - name: List dist files
        run: ls -lh dist/

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*
